# Deploy the metacubexd dashboard with the background traffic collector built in:
#   docker compose up -d --build
#
# Open http://localhost, then enable Settings -> XD Config -> Background Collector.
# No collector address is needed: the dashboard reaches the bundled collector
# internally (same-origin /__collector proxy), and auto-syncs your mihomo endpoint.
services:
  metacubexd:
    build: .
    image: metacubexd:local
    container_name: metacubexd
    restart: always
    init: true
    # ports:
    #   - '80:80'
    # Optional: connect the built-in collector to mihomo on startup so it records
    # 24/7 even when no browser is open (and survives restarts). Use your mihomo
    # controller — the same one the dashboard connects to. If left unset, the
    # dashboard auto-syncs the endpoint when you enable the collector. Uncomment
    # the `environment:` key together with the vars you need.
    # environment:
    #   MIHOMO_API_URL: 'http://your-mihomo-host:9090'
    #   MIHOMO_SECRET: 'your-secret'
    #   RETENTION_MS: '0'           # 0 = keep forever; e.g. 2592000000 = 30 days
    #   ENABLE_COLLECTOR: 'true'    # set 'false' to run the dashboard only
    volumes:
      - collector-data:/data

volumes:
  collector-data:
